<!DOCTYPE html>
<html>
    <head>

    </head>
    <body>

        <h2>The JavaScript String() Method</h2>

        <p>The String() method can convert a number to a string.</p>

        <p id="number_result"></p>
        <p id="string_result"></p>

        <script>
            var x = 70;
            var y = 90;

            document.getElementById("number_result").innerHTML = x + y;

            document.getElementById("string_result").innerHTML = String(x) + String(y);
            // Does not add because it is a string it concatenates
        </script>

        <h2>JavaScript Error Handling</h2>

        <p>This example demonstrates how to use <b>catch</b> to display an error.</p>

        <p id="error_message"></p>

        <script>
            try {
                addalert("Welcome guest!")
            }
            catch(err) {
                document.getElementById("error_message").innerHTML = err.message;
            }
        </script>

        <h2>JavaScript Arrow Function</h2>

        <p>This example shows an Arrow Function with a parameter.</p>

        <p id="result"></p>

        <script>
            const add = (a,b) => a + b;

            document.getElementById("result").innerHTML = add(4,6);
        </script>
    </body>
</html>
