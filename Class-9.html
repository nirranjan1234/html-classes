<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                text-align: center;
                padding-top: 50px;
                background-image: url("https://www.shutterstock.com/image-photo/snowy-winter-forest-falling-snowflakes-260nw-2516152021.jpg");
                background-repeat: no-repeat;
                background-size: 100% 1000px;
            }
            div{
                border: 5px solid bisque;
                background: gold;
                width: 500px;
            }
            #myInput{
                width: 492px;
                height: 50px;
            }
            button {
                width: 492px;
                background-color: aquamarine;
            }
        </style>

    </head>
    <body>
        <center>
     <div>
        <marquee><h1>Add your To Do List here</h1></marquee>
        <form id="myForm">
            <input id="myInput" type="text">
            <button> <b>ADD</b> </button>
        </form>

        <h3>To Do List</h3>
        <ul id="myItem"></ul>
        <marquee>
            <img src="https://pbs.twimg.com/profile_images/1520695854/50pxhead_400x400.png">
        </marquee>
        </div>
        </center>

        <script>
            var myForm = document.getElementById("myForm");
            var myInput = document.getElementById("myInput");
            var myItem = document.getElementById("myItem");

            myForm.addEventListener("submit", function(event){
                event.preventDefault();
                createItem(myInput.value)
            })

            function createItem(inputItems){
                var items = `<li>${inputItems}
                    <button onclick="deleteElement(this)">Delete</button></li>`
                    myItem.insertAdjacentHTML("beforeend", items)
                    myInput.value = ""
                    myInput.focus()
            }

            function deleteElement(ElementToDelete){
                ElementToDelete.parentElement.remove()
            }
        </script>
        
    </body>
</html>
