<!DOCTYPE html>
<html>
<head>
  <title>My School Event Data Viewer</title>
 
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff3f3;
      color: #222222;
      text-align: center;
    }
 
    .event-card {
      width: 520px;
      background-color: white;
      border: 3px solid #f63b3b;
      border-radius: 18px;
      margin: 40px auto;
      padding: 25px;
      box-shadow: 0 0 18px #fd9393;
    }
 
    h1 {
      color: #d81d1d;
    }
 
    button {
      background-color: #eb2525;
      color: white;
      border: none;
      border-radius: 25px;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }
 
    button:hover {
      background-color: #af1e1e;
    }
 
    .info-box {
      background-color: #ffefef;
      border: 2px dashed #fa6060;
      border-radius: 12px;
      margin-top: 18px;
      padding: 15px;
      text-align: left;
      line-height: 1.7;
    }
 
    #status {
      color: #a31616;
      font-weight: bold;
      font-size: 18px;
    }
 
    #jsonOutput {
      color: #7c1212;
      font-size: 14px;
      word-wrap: break-word;
    }
  </style>
</head>
 
<body>
 
  <div class="event-card">
 
    <h1>The Ultimate School Event Data Viewer</h1>
 
    <p>
      Click the button to load school event details using JSON and asynchronous JavaScript.
    </p>
 
    <button onclick="showSchoolEvent()">Load Event Details</button>
 
    <div class="info-box">
      <h2>Loading Status</h2>
      <p id="status">Waiting to load event data...</p>
    </div>
 
    <div class="info-box">
      <h2>Event Details</h2>
      <p id="eventDetails"></p>
    </div>
 
    <div class="info-box">
      <h2>JSON Text Output</h2>
      <p id="jsonOutput"></p>
    </div>
 
  </div>
 
  <script>
 
    // Callback function
    function showLoadingMessage(message) {
      document.getElementById("status").innerHTML = message;
    }
 
    // Promise in JavaScript
    function fetchSchoolEventData(callback) {
 
      callback("Loading school event data... Please wait.");
 
      return new Promise(function(resolve) {
 
        // Asynchronous JavaScript using setTimeout()
        setTimeout(function() {
 
          // JSON data
          let schoolEvent = {
            eventName: "Annual Pig Wrestling Competition",
            date: "21 September 2026",
            time: "12:00 AM",
            venue: "Science Hall",
            ringleader: "Mr. Kaleeswaran",
            participants: 1000000000,
            isRegistrationOpen: true
          };
 
          resolve(schoolEvent);
 
        }, 2000);
      });
    }
 
    // async/await in JavaScript
    async function showSchoolEvent() {
 
      let eventData = await fetchSchoolEventData(showLoadingMessage);
 
      document.getElementById("status").innerHTML = "Event data loaded successfully!";
 
      // JSON.stringify()
      let jsonText = JSON.stringify(eventData);
 
      // JSON.parse()
      let parsedEvent = JSON.parse(jsonText);
 
      // String concatenation to build the final display message
      let eventMessage = "";
      eventMessage = eventMessage + "Event Name: " + parsedEvent.eventName + "<br>";
      eventMessage = eventMessage + "Date: " + parsedEvent.date + "<br>";
      eventMessage = eventMessage + "Time: " + parsedEvent.time + "<br>";
      eventMessage = eventMessage + "Venue: " + parsedEvent.venue + "<br>";
      eventMessage = eventMessage + "Coordinator: " + parsedEvent.coordinator + "<br>";
      eventMessage = eventMessage + "Participants: " + parsedEvent.participants + "<br>";
 
      if (parsedEvent.isRegistrationOpen === true) {
        eventMessage = eventMessage + "Registration Status: Open";
      } else {
        eventMessage = eventMessage + "Registration Status: Closed";
      }
 
      document.getElementById("eventDetails").innerHTML = eventMessage;
      document.getElementById("jsonOutput").innerHTML = jsonText;
    }
 
  </script>
 
</body>
</html>
