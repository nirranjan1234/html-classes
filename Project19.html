<!doctype html>
<html lang="en">
  <head>
    <title>My Bootstrap</title>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
  </head>
  <body>
      
    <div class="container">
        <h2>Monkey</h2>
        <div id="myCarousel" class="carousel slide" data-ride="carousel">
            <!--Indicators-->
            <ol class="carousel-indicators">
                <li data-target="#myCarousel" data-slide to="0" class="active"></li>
                <li data-target="#myCarousel" data-slide to="1"></li>
                <li data-target="#myCarousel" data-slide to="2"></li>
            </ol>
            <br><br>

            <div class="carousel-inner">
              <div class="item active">
                <img src="https://media.newyorker.com/photos/59095bb86552fa0be682d9d0/master/pass/Monkey-Selfie.jpg" alt="Image 1">
              </div>

              <div class="item">
                <img src="https://cdn.thegreatprojects.com/thegreatprojects/images/f/8/7/f/a/f87fa6994c3c3a80f59a1f0363f27ec9.jpg?width=364&height=364&format=jpg" alt="image 2">
              </div>

              <div class="item">
                <img src="https://a-z-animals.com/media/2022/09/shutterstock_88192939-1024x768.jpg" alt="image 3">
              </div>
            </div>

            <!--Left and right controls-->
            <a class="left carousel-control" href="" data-slide="prev">
              <span class="glyphonicon glyphonicon-chevron-left"></span>
              <span class="sr-only">Previous</span>
            </a>
            <a class="right carousel-control" href="#myCarousel" data-slide="next">
              <span class="glyphonicon glyphonicon-chevron-right"></span>
              <span class="sr-only">Next</span>
            </a>
        </div>
    </div>
  </body>
</html>
