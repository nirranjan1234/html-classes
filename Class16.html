<!doctype html>
<html lang="en">
  <head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  </head>
  <body>
    <div class="jumbotron text-center">
        <h1>Jumbotron</h1>
    </div>


    <div class="container">
        <h1>Buttons</h1>
        <button type="button" class="btn btn-primary">
            <a href="https://www.amazon.ca/?tag=hydcaabkg-20&hvadid=677743594510&hvpos=&hvnetw=g&hvrand=3173775954459794367&hvpone=&hvptwo=&hvqmt=e&hvdev=c&hvdvcmdl=&hvlocint=&hvlocphy=9001461&hvtargid=kwd-10573980&ref=pd_sl_7cbrgyloqa_e&hydadcr=20060_13508853&gad_source=1">Primary</a></button>
        <button type="button" class="btn btn-secondary">Secondary</button>
        <button type="button" class="btn btn-success">Success</button>
        <button type="button" class="btn btn-warning">Warning</button>
        <button type="button" class="btn btn-danger">Danger</button>
    </div>


    <div class="container">
        <h2>Contextual Badges</h2>
        <span class="badge badge-primary">Primary</span>
        <span class="badge badge-secondary">Secondary</span>
        <span class="badge badge-success">Success</span>
        <span class="badge badge-danger">Danger</span>
        <span class="badge badge-warning">Warning</span>
        <span class="badge badge-info">Info</span>
        <span class="badge badge-light">Light</span>
        <span class="badge badge-dark">Dark</span>

    </div>


    <div class="container">
        <h2>Basic Progress Bar</h2>
        <p>To create a default progress bar, add a .container element 
        and add the progress-bar class to its child element. Use the CSS width property to
        set the width of the progress bar
        </p>
        <div class="progress">
            <div class="progress-bar" style="width:70%">70%</div>
        </div>
    </div>
 
  </body>
</html>
