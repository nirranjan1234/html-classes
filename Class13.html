<!doctype html>
<html lang="en">
  <head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  </head>
  <body>
      
      <div class="container">
        <h3>Equal Width Column Grid</h3>
        <div class="row">
        <div class="col">
            Column 1
        </div>
        <div class="col">
            Column 2
        </div>
        <div class="col">
            Column 3
        </div>
        </div>


        <br>
        <br>

        <p>Resize the browser window to see the effect.</p>
        <div class="row">
            <!--Size Medium and extra small-->
            <div class="col-md-8 col-xs-4" style="background-color:red; border: 1px solid black">
                extra small
            </div>

            <div class="col-md-12 col-md-5" style="background-color:rgb(25, 87, 76); border: 1px solid black">
                .col-xs-3
            </div>
        </div>


        <div class="row">
            <!--Size Large Medium and extra small-->
            <div class="col-md-12 col-lg-6" style="background-color:rgb(17, 56, 114); border: 1px solid black">
                .col-xs-6
            </div>

            <div class="col-xs-6 col-md-2" style="background-color:rgb(124, 23, 23); border: 1px solid black">
                .col-xs-6
            </div>
        </div>


        <div class="row">
            <!--Size Medium and extra small-->
            <div class="col-xs-6" style="background-color:rgb(153, 64, 64); border: 1px solid black">
                .col-xs-6
            </div>

            <div class="col-xs-6" style="background-color:rgb(95, 158, 54); border: 1px solid black">
                .col-xs-6
            </div>
        </div>


        <div class="row">
            <!--Size large-->
            <div class="col-lg-4" style="background-color:rgb(249, 253, 4); border: 1px solid black">
                dummy
            </div>

            <div class="col-lg-8" style="background-color:rgb(87, 25, 87); border: 1px solid black">
                dummy
            </div>
        </div>
      </div>
    
  </body>
</html>
