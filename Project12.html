<!DOCTYPE html>
<html>
<head>
    <style>
        div{
            right: 30px;
            border: 4px solid green;
        }
        div.sticky{
            position: sticky;
            top: 0;
            right: 20px;
            width: 100px;
            border: 3px solid #de7878
        }
        div.relative {
            position: relative;
            top: 0;
            right: 20px;
            width: 300px;
            border: 3px solid #f603f2;

        }
        div.fixed{
            position: fixed;
            top: 0;
            right: 20px;
            width: 300px;
            border: 3px solid #73AD21
        }
        div.first{
            opacity: 0.1;
        }
        div.second{
            opacity: 0.3;
        }
        div.third{
            opacity: 0.6;
        }


    </style>
</head>
<body>
    <h1>POSITIONING</h1>
    <div>
        div with nothing
    </div>
    <br>
    <div class="sticky">
        sticky div
    </div>
    <br>
    <div class="relative">
        relative div
    </div>
    <br>
    <div class="fixed">
        fixed div
    </div>

    <div><p>Opacity 1(default)</p></div>
