    <body>
        <center>
        <div id="Thewholething">
        
        <h1>Calendar</h1>

        <h1><div id="MyClockDisplay" onload="showTime()"></div></h1>
        
        </div>
        </center>
        <script>
            function showTime(){
                var date = new Date();
                var h = date.getMonth();
                var m = date.getDate();
                var s = date.getFullYear();
               

                if(h > 12){
                    h = h - 12;
                    session = "PM"
                }

                h = (h < 10) ? "0" + h : h;
                m = (m < 10) ? "0" + m : m;
                s = (s < 10) ? "0" + s : s;

                var time = h + "-" + m + "-" + s + " " ;
                document.getElementById("MyClockDisplay").innerText = time;
                setTimeout(showTime, 1000);
            }

            showTime();

        </script>
